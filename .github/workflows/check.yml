name: check

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  wgsl-core-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check wgsl core
        run: |
          moon -C modules/wgsl update
          moon -C modules/wgsl fmt
          moon -C modules/wgsl info --target all
          moon -C modules/wgsl check --target all --warn-list +73 --deny-warn
          moon -C modules/wgsl test --target all
          git diff --exit-code

  naga-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check Naga compatibility module
        run: |
          moon -C modules/moon_wgsl_naga update
          moon -C modules/moon_wgsl_naga fmt
          moon -C modules/moon_wgsl_naga info --target all
          moon -C modules/moon_wgsl_naga check --target all --warn-list +73 --deny-warn
          moon -C modules/moon_wgsl_naga test --target all
          git diff --exit-code

  naga-oil-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check naga-oil compatibility module
        run: |
          moon -C modules/moon_wgsl_naga_oil update
          moon -C modules/moon_wgsl_naga_oil fmt
          moon -C modules/moon_wgsl_naga_oil info --target all
          moon -C modules/moon_wgsl_naga_oil check --target all --warn-list +73 --deny-warn
          moon -C modules/moon_wgsl_naga_oil test --target all
          git diff --exit-code

  facade-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check facade module
        run: |
          moon -C modules/moon_wgsl update
          moon -C modules/moon_wgsl fmt
          moon -C modules/moon_wgsl info --target all
          moon -C modules/moon_wgsl check --target all --warn-list +73 --deny-warn
          moon -C modules/moon_wgsl test --target all
          git diff --exit-code

  wesl-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check WESL module
        run: |
          moon -C modules/moon_wesl update
          moon -C modules/moon_wesl fmt
          moon -C modules/moon_wesl info --target all
          moon check modules/moon_wesl --target all --warn-list +73 --deny-warn
          moon test modules/moon_wesl --target all
          git diff --exit-code

  workspace-integration:
    runs-on: ubuntu-latest
    needs:
      - wgsl-core-fast
      - naga-fast
      - naga-oil-fast
      - facade-fast
      - wesl-fast
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CI runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan1 \
            mesa-vulkan-drivers \
            ripgrep \
            vulkan-tools

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            tools/naga_oil_oracle/target
            tools/wgpu_validation/.mooncakes/Milky2018/wgpu_mbt/src/c/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/naga_oil_oracle/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Tool versions
        run: |
          moon version --all
          node --version
          cargo --version

      - name: Workspace Moon gates
        run: |
          moon update
          moon -C tools/wgpu_validation update
          moon fmt
          moon info --target all
          moon check --target all --warn-list +73 --deny-warn
          ulimit -s 8176
          moon test --target all
          git diff --exit-code

      - name: Test filter guard
        run: bash tools/check_moon_test_filters.sh

      - name: Architecture guardrails
        run: bash tools/check_architecture_guardrails.sh

      - name: Release archives
        run: |
          bash tools/check_release_archives.sh
          git diff --exit-code

      - name: IR roundtrip corpus
        run: |
          ulimit -s 8176
          bash tools/check_ir_roundtrip_corpus.sh

      - name: WGSL validation corpus
        run: |
          ulimit -s 8176
          bash tools/check_wgsl_validation.sh

      - name: WGSL corpus matrix
        run: |
          ulimit -s 8176
          bash tools/check_wgsl_corpus_matrix.sh

      - name: WGSL builtin coverage
        run: |
          ulimit -s 8176
          bash tools/check_wgsl_builtin_coverage.sh

      - name: WGSL generated differential
        run: |
          ulimit -s 8176
          bash tools/check_wgsl_differential_generated.sh

      - name: wgpu runtime validation
        run: |
          ulimit -s 8176
          bash tools/check_wgpu_validation.sh

      - name: Moon WGSL byte parity
        run: |
          ulimit -s 8176
          bash tools/check_moon_wgsl_byte_parity.sh

      - name: External naga-oil compose parity
        run: |
          ulimit -s 8176
          bash tools/check_external_naga_oil_compose_parity.sh

      - name: Moon WGSL error parity
        run: |
          ulimit -s 8176
          bash tools/check_moon_wgsl_error_parity.sh

      - name: Naga Oil parity inventory
        run: bash tools/check_naga_oil_parity_inventory.sh

      - name: Naga Oil preprocess parity
        run: |
          ulimit -s 8176
          bash tools/check_preprocess_parity.sh

      - name: Official GPUWeb WGSL CTS corpus
        env:
          WGSL_CTS_REF: 3b327ebc44f11212fd3872972a6dd394634fb9e3
        run: |
          ulimit -s 8176
          bash tools/check_official_wgsl_corpus.sh

      - name: External real-project WGSL corpus
        run: |
          ulimit -s 8176
          bash tools/check_external_wgsl_corpus.sh

      - name: Bevy PBR compose performance
        run: |
          ulimit -s 8176
          bash tools/check_bevy_pbr_compose_performance.sh
